{{ define "main" }}
<section class="page-hero">
  <div class="section-container">
    <h1>{{ .Title }}</h1>
    {{ with .Params.subtitle }}<p class="page-subtitle">{{ . }}</p>{{ end }}
  </div>
</section>
<section class="page-content">
  <div class="content-container">
    {{ .Content }}
  </div>
</section>
{{ end }}
